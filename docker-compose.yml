version: '3.8'

services:
  email-rag:
    build: .
    container_name: email-rag
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - API_URL=http://localhost:8000
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
    restart: unless-stopped